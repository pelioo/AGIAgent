<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-agent Viewer</title>
    <!-- Google Fonts - Modern Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load Mermaid with error handling -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" 
            crossorigin="anonymous"
            onerror="console.error('Failed to load Mermaid from CDN'); window.mermaidLoadFailed = true;">
    </script>
    <!-- Load external CSS -->
    <link rel="stylesheet" href="../static/css/agent_status_visualizer.css">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <!-- Debug: Page loaded indicator -->
    <script>
        console.log('HTML body tag reached');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded event fired');
        });
        window.addEventListener('load', function() {
            // Check if Mermaid loaded after page load
            setTimeout(function() {
                if (typeof mermaid === 'undefined') {
                    console.warn('Mermaid still not loaded after page load');
                    const container = document.getElementById('diagram-container');
                    if (container) {
                        container.innerHTML = '<div class="error">Mermaid library failed to load. Your browser may be blocking CDN access due to privacy settings.<br><small>Please allow access to cdn.jsdelivr.net or disable tracking prevention for this site.</small></div>';
                    }
                }
            }, 2000);
        });
    </script>
    <div class="container">
        <div class="header-info">
            <div>
                <h1>Multi-agent Viewer</h1>
                <div class="last-update" id="lastUpdate">Loading...</div>
                <div class="output-dir" id="outputDir">
                    <strong>📁 Directory </strong> <span id="outputDirPath">loading...</span>
                </div>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Live</span>
            </div>
        </div>

        <div class="controls">
            <button id="refreshBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                    <path d="M16 16h5v5"></path>
                </svg>
                Refresh
            </button>
            <button id="reloadBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                    <path d="M8 16H3v5"></path>
                </svg>
                Reload Directory
            </button>
            <label class="auto-refresh-label">
                <input type="checkbox" id="autoRefresh" checked>
                <span>Auto-refresh (10s)</span>
            </label>
        </div>

        <div id="errorContainer"></div>

        <div id="mermaidFigures" class="mermaid-figures">
            <h2>📊 Plan Diagrams</h2>
            <div id="mermaidFiguresContent">
                <!-- Mermaid figures will be loaded here -->
                <p>No plan diagrams found.</p>
            </div>
        </div>

        <div id="agentSummary" class="agent-summary"></div>

        <div id="diagram-container">
            <div class="loading" id="loadingIndicator">
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 18px; margin-bottom: 10px;">⏳ Loading...</div>
                    <div style="font-size: 14px; color: #666;" id="loadingStatus">Initializing...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load external JavaScript -->
    <script src="../static/js/agent_status_visualizer.js"></script>
    
    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            
            // Check for saved theme preference or respect OS setting
            const savedTheme = localStorage.getItem('theme');
            const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDarkScheme.matches)) {
                body.setAttribute('data-theme', 'dark');
            }
            
            themeToggle.addEventListener('click', function() {
                if (body.getAttribute('data-theme') === 'dark') {
                    body.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    body.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
</body>
</html>
